{% extends "base.html" %}
{% block title %}New Agent - OPC{% endblock %}
{% block body %}
<div class="layout">
    {% let active = "agents" %}
    {% include "components/sidebar.html" %}
    <main class="main">
        <div class="page-header">
            <h1>Create Agent</h1>
        </div>
        <div class="card" style="max-width: 600px;">
            <form hx-post="/api/agents" hx-swap="none" hx-on::after-request="if(event.detail.successful) window.location='/agents'">
                <div class="form-group">
                    <label class="form-label">Name *</label>
                    <input type="text" name="name" class="form-input" required placeholder="e.g., Code Writer">
                </div>
                <div class="form-group">
                    <label class="form-label">Title</label>
                    <input type="text" name="title" class="form-input" placeholder="e.g., Senior Developer">
                </div>
                <div class="form-group">
                    <label class="form-label">Role</label>
                    <input type="text" name="role" class="form-input" placeholder="e.g., development">
                </div>
                <div class="form-group">
                    <label class="form-label">Capabilities</label>
                    <textarea name="capabilities" class="form-textarea" placeholder="Describe what this agent can do..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Adapter Type *</label>
                    <select name="adapter_type" class="form-select" required>
                        <option value="http">HTTP Webhook</option>
                        <option value="claude_code">Claude Code</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Adapter Config (JSON)</label>
                    <textarea name="adapter_config" class="form-textarea" placeholder='{"webhook_url": "https://..."}'>{}</textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Monthly Budget (cents, 0 = unlimited)</label>
                    <input type="number" name="monthly_budget_cents" class="form-input" value="0">
                </div>
                <button type="submit" class="btn btn-primary">Create Agent</button>
            </form>
        </div>
    </main>
</div>
{% endblock %}
