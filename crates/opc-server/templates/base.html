<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OPC{% endblock %}</title>
    <script src="/static/htmx.min.js"></script>
    <style>
        :root {
            --bg: #0f1117;
            --bg-card: #1a1d27;
            --bg-hover: #252836;
            --border: #2a2d3a;
            --text: #e4e4e7;
            --text-muted: #71717a;
            --primary: #6366f1;
            --primary-hover: #818cf8;
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
            --orange: #f97316;
            --blue: #3b82f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        a { color: var(--primary); text-decoration: none; }
        a:hover { color: var(--primary-hover); }

        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background: var(--bg-card); border-right: 1px solid var(--border); padding: 1rem 0; position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar-logo { padding: 0 1.25rem 1.5rem; font-size: 1.25rem; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 0.5rem; }
        .sidebar-logo span { color: var(--primary); }
        .sidebar nav a { display: flex; align-items: center; gap: 0.75rem; padding: 0.625rem 1.25rem; color: var(--text-muted); font-size: 0.875rem; transition: all 0.15s; }
        .sidebar nav a:hover, .sidebar nav a.active { background: var(--bg-hover); color: var(--text); }
        .sidebar nav a.active { border-right: 2px solid var(--primary); }
        .sidebar .badge { background: var(--red); color: white; font-size: 0.7rem; padding: 0.125rem 0.5rem; border-radius: 9999px; margin-left: auto; }

        .main { margin-left: 240px; flex: 1; padding: 2rem; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
        .page-header h1 { font-size: 1.5rem; font-weight: 600; }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.25rem; margin-bottom: 1rem; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
        .card-title { font-size: 0.875rem; font-weight: 600; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.05em; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.25rem; }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-value { font-size: 2rem; font-weight: 700; margin-top: 0.25rem; }

        .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; cursor: pointer; border: 1px solid var(--border); transition: all 0.15s; }
        .btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-green { background: var(--green); color: white; border-color: var(--green); }
        .btn-red { background: var(--red); color: white; border-color: var(--red); }
        .btn-yellow { background: var(--yellow); color: black; border-color: var(--yellow); }
        .btn-ghost { background: transparent; color: var(--text-muted); }
        .btn-ghost:hover { color: var(--text); background: var(--bg-hover); }
        .btn-sm { padding: 0.25rem 0.625rem; font-size: 0.8rem; }

        .badge-status { display: inline-flex; align-items: center; padding: 0.125rem 0.625rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
        .badge-backlog { background: #27272a; color: #a1a1aa; }
        .badge-todo { background: #1e3a5f; color: #60a5fa; }
        .badge-in_progress { background: #1e3a5f; color: #60a5fa; }
        .badge-awaiting_approval { background: #422006; color: #fbbf24; }
        .badge-approved { background: #052e16; color: #4ade80; }
        .badge-changes_requested { background: #431407; color: #fb923c; }
        .badge-done { background: #052e16; color: #4ade80; }
        .badge-blocked { background: #450a0a; color: #fca5a5; }
        .badge-cancelled { background: #27272a; color: #a1a1aa; }
        .badge-idle { background: #27272a; color: #a1a1aa; }
        .badge-running { background: #1e3a5f; color: #60a5fa; }
        .badge-error { background: #450a0a; color: #fca5a5; }
        .badge-paused { background: #422006; color: #fbbf24; }
        .badge-pending { background: #422006; color: #fbbf24; }
        .badge-draft { background: #27272a; color: #a1a1aa; }
        .badge-active { background: #052e16; color: #4ade80; }

        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.875rem; }
        th { color: var(--text-muted); font-weight: 500; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
        tr:hover { background: var(--bg-hover); }

        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.375rem; color: var(--text-muted); }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 0.5rem 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: 0.5rem; color: var(--text); font-size: 0.875rem; }
        .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary); }
        .form-textarea { min-height: 100px; resize: vertical; font-family: inherit; }

        .comment-thread { display: flex; flex-direction: column; gap: 0.75rem; }
        .comment { padding: 0.75rem 1rem; border-radius: 0.5rem; }
        .comment-human { background: #1e293b; border-left: 3px solid var(--primary); }
        .comment-agent { background: #1c1917; border-left: 3px solid var(--orange); }
        .comment-meta { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.375rem; }
        .comment-body { font-size: 0.875rem; white-space: pre-wrap; word-break: break-word; }

        .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
        .empty-state-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

        .approval-actions { display: flex; gap: 0.75rem; margin-top: 1rem; }
        .approval-actions .btn { flex: 1; justify-content: center; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
