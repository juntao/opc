name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build

  test:
    name: Test
    runs-on: ubuntu-24.04-arm
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install and start PostgreSQL
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql postgresql-client
          sudo systemctl start postgresql
          sudo -u postgres createuser -s opc
          sudo -u postgres psql -c "ALTER USER opc PASSWORD 'opc';"
          sudo -u postgres createdb -O opc opc
      - name: Run tests
        env:
          DATABASE_URL: postgresql://opc:opc@localhost:5432/opc
        run: cargo test
